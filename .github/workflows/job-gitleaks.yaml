name: Gitleaks
# Secret scan on EVERY push and PR -- no paths-ignore, because a secret can land
# in any file, docs included. Hard failure: the action exits non-zero on a finding.
on:
  push:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  gitleaks:
    name: 🔒 Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
