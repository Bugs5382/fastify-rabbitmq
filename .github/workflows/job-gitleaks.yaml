name: Gitleaks
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
