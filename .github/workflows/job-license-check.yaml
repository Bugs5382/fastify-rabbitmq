name: License Check
# Fail if a 3rd-party dependency carries a license outside the allowlist.
# Ecosystem-aware: each job early-exits if its manifest is absent. hashFiles()
# is NOT valid in a job-level `if` (no workspace before checkout), so the
# manifest check lives in a step. No SAST/vuln scanning (deliberately out of scope).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  npm:
    name: npm dependency licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect package.json
        id: manifest
        run: |
          if [ -f package.json ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false (skipping)"; echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Node
        if: steps.manifest.outputs.found == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        if: steps.manifest.outputs.found == 'true'
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Check dependency licenses
        if: steps.manifest.outputs.found == 'true'
        run: |
          npx --yes license-checker-rseidelsohn \
            --production --excludePrivatePackages \
            --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;Python-2.0"

  go:
    name: Go dependency licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect go.mod
        id: manifest
        run: |
          if [ -f go.mod ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false (skipping)"; echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Go
        if: steps.manifest.outputs.found == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Check dependency licenses
        if: steps.manifest.outputs.found == 'true'
        run: |
          go install github.com/google/go-licenses@latest
          "$(go env GOPATH)/bin/go-licenses" check ./... \
            --allowed_licenses=MIT,ISC,Apache-2.0,BSD-2-Clause,BSD-3-Clause,0BSD,CC0-1.0,Unlicense
