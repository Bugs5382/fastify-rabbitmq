# Canonical release-drafter config for every Bugs5382 repo (libraries/extensions
# use release-drafter; only apps would use release-please, which we do not ship).
# The autolabeler derives the categorizing label from the conventional-commit PR
# title, so labeling is near-zero-effort; job-label-checker is the backstop.
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  # What Changed 👀

  $CHANGES

  # Extra

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: 💥 Breaking Changes
    labels: [breaking]
  - title: 🚀 Features
    labels: [enhancement]
  - title: 🐛 Bug Fixes
    labels: [bug, fix]
  - title: ⚡ Performance
    labels: [performance]
  - title: ⚠️ Changes
    labels: [refactor, changed]
  - title: ⛔️ Deprecated
    labels: [deprecated]
  - title: 🗑 Removed
    labels: [removed]
  - title: 🔐 Security
    labels: [security]
  - title: 📄 Documentation
    labels: [documentation]
  - title: 🧩 Dependency Updates
    labels: [dependencies]
    collapse-after: 5
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: [breaking]
  minor:
    labels: [enhancement]
  patch:
    labels: [fix, bug, performance, refactor, changed, deprecated, removed, security, documentation, dependencies]
  default: patch
autolabeler:
  - label: breaking
    title:
      - '/^[a-z]+(\(.+\))?!:/'
      - '/BREAKING[ -]CHANGE/'
  - label: enhancement
    title: ['/^feat(\(.+\))?:/']
  - label: fix
    title: ['/^fix(\(.+\))?:/']
  - label: performance
    title: ['/^perf(\(.+\))?:/']
  - label: refactor
    title: ['/^refactor(\(.+\))?:/']
  - label: documentation
    title: ['/^docs(\(.+\))?:/']
  - label: dependencies
    title:
      - '/^build(\(.+\))?:/'
      - '/^chore\(deps.*\):/'
  - label: security
    title: ['/^security(\(.+\))?:/']
  - label: skip-changelog
    title:
      - '/^(ci|test|style)(\(.+\))?:/'
      - '/^chore(?!\(deps)(\(.+\))?:/'
exclude-labels:
  - skip-changelog
